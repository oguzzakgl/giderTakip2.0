[build]
  base = "frontend/"
  publish = "dist"
  command = "npm run build"

[functions]
  directory = "../netlify/functions"
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "20"
  # Netlify Dashboard > Site Settings > Environment Variables bölümüne ekle:
  # GEMINI_API_KEY = senin_gemini_api_keyin

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

